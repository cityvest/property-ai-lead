<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Property Lead Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mobile-first property lead and agent report dashboard for property agents.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── HEADER ── -->
  <div class="header">
    <div class="header-inner">
      <p class="header-eyebrow">Agent Workspace</p>
      <h1>Property Lead<br>Dashboard</h1>
      <div class="header-meta">
        <span class="badge"><span class="dot"></span> Live</span>
        <span class="badge" id="total-badge">0 Records</span>
      </div>
    </div>
  </div>

  <!-- ── TAB NAV ── -->
  <nav class="tab-nav">
    <div class="tab-nav-inner">
      <button class="tab-btn active" onclick="switchTab('buyers', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Buyers
      </button>
      <button class="tab-btn" onclick="switchTab('reports', this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Reports
      </button>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- BUYER SECTION -->
    <div class="section active" id="section-buyers">

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total Buyers</div>
          <div class="stat-value blue" id="stat-buyers">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Locations</div>
          <div class="stat-value" id="stat-locations">—</div>
        </div>
      </div>

      <div class="form-card">
        <div class="form-card-header">
          <div class="form-card-icon blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--blue-600)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <line x1="19" y1="8" x2="19" y2="14"/>
              <line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
          </div>
          <div>
            <div class="form-card-title">Add Buyer Criteria</div>
            <div class="form-card-subtitle">Log a new buyer's requirements</div>
          </div>
        </div>
        <div class="form-body">
          <div class="field-group">
            <label for="name">Buyer Name</label>
            <input id="name" placeholder="e.g. Ahmad Razif" autocomplete="name">
          </div>
          <div class="field-row">
            <div class="field-group">
              <label for="budget">Budget</label>
              <input id="budget" placeholder="e.g. RM 650k">
            </div>
            <div class="field-group">
              <label for="type">Property Type</label>
              <input id="type" placeholder="e.g. Condo">
            </div>
          </div>
          <div class="field-group">
            <label for="location">Preferred Location</label>
            <input id="location" placeholder="e.g. Mont Kiara, TTDI">
          </div>
          <div class="field-group">
            <label for="notes">Notes</label>
            <textarea id="notes" placeholder="Any specific requirements, must-haves, preferences…"></textarea>
          </div>
          <button class="btn-primary" onclick="addBuyer()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Buyer
          </button>
        </div>
      </div>

      <div class="section-divider">
        <div class="section-divider-line"></div>
        <div class="section-divider-label">Saved Buyers</div>
        <div class="section-divider-line"></div>
      </div>

      <div id="buyerList"></div>
    </div>

    <!-- REPORT SECTION -->
    <div class="section" id="section-reports">

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total Reports</div>
          <div class="stat-value teal" id="stat-reports">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Leads</div>
          <div class="stat-value" id="stat-leads">0</div>
        </div>
      </div>

      <div class="form-card">
        <div class="form-card-header">
          <div class="form-card-icon teal">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--teal-600)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </div>
          <div>
            <div class="form-card-title">Agent Report</div>
            <div class="form-card-subtitle">Log weekly leads and conversions</div>
          </div>
        </div>
        <div class="form-body">
          <div class="field-group">
            <label for="agent">Agent Name</label>
            <input id="agent" placeholder="e.g. Siti Norzahira" autocomplete="name">
          </div>
          <div class="field-row">
            <div class="field-group">
              <label for="leads">Leads</label>
              <input id="leads" type="number" placeholder="e.g. 12">
            </div>
            <div class="field-group">
              <label for="conversion">Conversions</label>
              <input id="conversion" type="number" placeholder="e.g. 3">
            </div>
          </div>
          <div class="field-group">
            <label for="rnotes">Notes</label>
            <textarea id="rnotes" placeholder="Highlights, challenges, follow-ups this week…"></textarea>
          </div>
          <button class="btn-primary btn-teal" onclick="addReport()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Report
          </button>
        </div>
      </div>

      <div class="section-divider">
        <div class="section-divider-line"></div>
        <div class="section-divider-label">Saved Reports</div>
        <div class="section-divider-line"></div>
      </div>

      <div id="reportList"></div>
    </div>

  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
